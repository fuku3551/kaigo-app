<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#2B6B5E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="重訪ケア管理" />
  <title>重訪ケア管理</title>
  <style>
    :root{
      --bg:#F7F5F0;
      --card:#fff;
      --primary:#2B6B5E;
      --primaryDark:#1E4D44;
      --primaryLight:#E8F0EE;
      --accent:#D4764E;
      --accentLight:#FDF0EB;
      --danger:#C0392B;
      --dangerLight:#FDEDEB;
      --text:#2C3E40;
      --textLight:#7A8B8D;
      --border:#E2DED6;
      --shadow:0 2px 12px rgba(43,107,94,.08);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
    body{min-height:100vh}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .header{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,var(--primary),var(--primaryDark));color:#fff;padding:18px 16px 16px;box-shadow:0 4px 20px rgba(43,107,94,.25)}
    .headerRow{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .brandIcon{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .title{font-size:17px;font-weight:800}
    .subtitle{font-size:11px;opacity:.8;margin-top:2px}
    .actions{display:flex;gap:8px;flex-shrink:0}
    .iconBtn{width:38px;height:38px;border:none;border-radius:11px;background:rgba(255,255,255,.15);color:#fff}
    .iconBtn.white{background:#fff;color:var(--primary)}
    .security{margin-top:10px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:10px 12px;font-size:11px;line-height:1.6}
    .main{max-width:760px;margin:0 auto;padding:14px 14px 110px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow)}
    .section{margin-bottom:12px;padding:16px}
    .muted{font-size:12px;color:var(--textLight)}
    .helper{font-size:12px;color:var(--textLight);line-height:1.6}
    .search{display:flex;gap:10px;align-items:center;padding:10px 14px;margin-bottom:10px}
    .search input{border:none;outline:none;background:transparent;flex:1;min-width:0}
    .empty{text-align:center;padding:48px 18px}
    .emptyIcon{width:62px;height:62px;border-radius:20px;background:var(--primaryLight);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--primary);font-size:28px}
    .chips{display:flex;gap:8px;overflow:auto;padding:2px 0 10px;margin-bottom:6px}
    .chip{white-space:nowrap;border:1px solid var(--border);background:#fff;color:var(--textLight);padding:7px 13px;border-radius:999px;font-size:12px}
    .chip.active{background:var(--primaryLight);color:var(--primaryDark);border:1.5px solid var(--primary);font-weight:700}
    .list{display:flex;flex-direction:column;gap:10px}
    .item{width:100%;border:1px solid var(--border);background:#fff;border-radius:14px;padding:14px;display:flex;gap:12px;align-items:flex-start;box-shadow:var(--shadow);text-align:left}
    .avatar{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--primaryLight),rgba(43,107,94,.15));display:flex;align-items:center;justify-content:center;color:var(--primary);font-weight:800;flex-shrink:0}
    .itemMain{flex:1;min-width:0}
    .nameRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
    .name{font-size:15px;font-weight:800;word-break:break-word}
    .miniBadge{font-size:10px;padding:2px 8px;border-radius:7px;background:var(--accentLight);color:var(--accent);font-weight:700}
    .office{font-size:11px;color:var(--primary);font-weight:700;margin-bottom:4px}
    .detailTop{text-align:center;padding:18px;margin-bottom:12px}
    .detailAvatar{width:66px;height:66px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--primaryDark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:800;margin:0 auto 10px}
    .detailName{font-size:21px;font-weight:800;margin-bottom:4px;word-break:break-word}
    .pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .pill{font-size:12px;background:var(--bg);padding:4px 10px;border-radius:9px}
    .pill.accent{background:var(--accentLight);color:var(--accent);font-weight:700}
    .sectionTitle{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:var(--primary);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--primaryLight)}
    .sectionTitle.accent{color:var(--accent);border-bottom-color:rgba(212,118,78,.18)}
    .infoRow{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--bg)}
    .infoLabel{font-size:12px;color:var(--textLight);min-width:78px}
    .infoValue{flex:1;text-align:right;font-size:13px;font-weight:600;word-break:break-all}
    .danger{color:var(--danger)}
    .box{background:var(--bg);border-radius:10px;padding:12px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
    .accentBox{background:var(--accentLight);border-left:3px solid var(--accent)}
    .dangerBox{background:var(--dangerLight);color:var(--danger)}
    .rowBtns{display:flex;gap:10px;margin-top:16px}
    .btn{border:none;border-radius:12px;padding:14px 16px;font-weight:800;font-size:14px}
    .btn.primary{background:var(--primary);color:#fff}
    .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
    .btn.danger{background:var(--danger);color:#fff}
    .btn.ghostDanger{background:#fff;color:var(--danger);border:1px solid var(--border);width:54px;flex-shrink:0}
    .formGrid{display:flex;flex-direction:column;gap:14px}
    .field label{display:flex;gap:4px;align-items:center;font-size:12px;font-weight:700;color:var(--textLight);margin-bottom:6px}
    .req{color:var(--accent);font-size:10px}
    .input,.textarea,.select{width:100%;border:1px solid var(--border);background:#fff;color:var(--text);border-radius:10px;padding:11px 14px;font-size:14px;outline:none}
    .textarea{resize:vertical;min-height:70px}
    .textarea.large{min-height:120px}
    .fieldRow{display:flex;gap:10px}
    .fieldRow>.field{flex:1;min-width:0}
    .settingsList{display:flex;flex-direction:column;gap:10px}
    .settingRow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border-radius:12px}
    .toggle{position:relative;width:52px;height:30px;border:none;border-radius:999px;background:#d8d3c8;flex-shrink:0}
    .toggle:after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:.2s}
    .toggle.active{background:var(--primary)}
    .toggle.active:after{left:25px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20}
    .dialog{width:100%;max-width:360px;background:#fff;border-radius:18px;padding:22px;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.18)}
    .dialogTitle{font-size:17px;font-weight:800;margin-bottom:8px}
    .dialogText{font-size:13px;color:var(--textLight);line-height:1.7;margin-bottom:18px;white-space:pre-wrap}
    .lock{position:fixed;inset:0;z-index:30;background:linear-gradient(180deg,#f5f2eb,#ecf4f1);display:flex;align-items:center;justify-content:center;padding:20px}
    .lockCard{width:100%;max-width:380px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.7);border-radius:22px;padding:24px 20px;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.12)}
    .lockBadge{width:64px;height:64px;margin:0 auto 16px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--primaryDark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:800}
    .pin{width:100%;text-align:center;font-size:26px;letter-spacing:.35em;padding:14px 10px;border-radius:14px;border:1px solid var(--border);margin-bottom:12px;outline:none}
    .errorWrap{padding:20px;max-width:760px;margin:0 auto}
    .errorBox{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
    @media (max-width:420px){.fieldRow{flex-direction:column}.header{padding-top:calc(16px + env(safe-area-inset-top))}.main{padding-bottom:calc(110px + env(safe-area-inset-bottom))}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'kaigo_working_clients_v3';
  const SETTINGS_KEY = 'kaigo_working_settings_v3';
  const PIN_KEY = 'kaigo_working_pin_v3';

  const DEFAULT_SETTINGS = {
    autoLockMinutes: 3,
    anonymousList: true,
    maskPhone: true
  };

  const app = document.getElementById('app');
  let lockTimer = null;

  const state = {
    clients: [],
    settings: { ...DEFAULT_SETTINGS },
    view: 'list',
    selectedId: null,
    formData: null,
    search: '',
    filterOffice: 'all',
    modal: null,
    locked: true,
    pinInput: '',
    pinStage: 'unlock',
    firstPin: ''
  };

  function safeParse(v, fallback) {
    try {
      if (typeof v !== 'string') return fallback;
      return JSON.parse(v);
    } catch (e) {
      return fallback;
    }
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function makeId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function normalizeSettings(raw) {
    const obj = raw && typeof raw === 'object' ? raw : {};
    const mins = Number(obj.autoLockMinutes);
    return {
      autoLockMinutes: [1,3,5,10,15].includes(mins) ? mins : 3,
      anonymousList: obj.anonymousList !== false,
      maskPhone: obj.maskPhone !== false
    };
  }

  function normalizeClient(x) {
    if (!x || typeof x !== 'object') return null;
    return {
      id: typeof x.id === 'string' && x.id ? x.id : makeId(),
      name: String(x.name || ''),
      nameKana: String(x.nameKana || ''),
      age: String(x.age || ''),
      gender: String(x.gender || ''),
      birthDate: String(x.birthDate || ''),
      phone: String(x.phone || ''),
      address: String(x.address || ''),
      officeName: String(x.officeName || ''),
      disabilityLevel: String(x.disabilityLevel || ''),
      notes: String(x.notes || ''),
      careDetails: String(x.careDetails || ''),
      specialNotes: String(x.specialNotes || ''),
      emergencyName: String(x.emergencyName || ''),
      emergencyRelation: String(x.emergencyRelation || ''),
      emergencyPhone: String(x.emergencyPhone || ''),
      emergencyNotes: String(x.emergencyNotes || ''),
      createdAt: String(x.createdAt || '')
    };
  }

  function load() {
    const rawClients = safeParse(localStorage.getItem(STORAGE_KEY), []);
    state.clients = Array.isArray(rawClients)
      ? rawClients.map(normalizeClient).filter(Boolean)
      : [];

    const rawSettings = safeParse(localStorage.getItem(SETTINGS_KEY), {});
    state.settings = normalizeSettings(rawSettings);

    const savedPin = localStorage.getItem(PIN_KEY);
    state.pinStage = savedPin ? 'unlock' : 'setup';
    state.locked = true;
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.clients));
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
  }

  function savePin(pin) {
    localStorage.setItem(PIN_KEY, pin);
  }

  function checkPin(pin) {
    return localStorage.getItem(PIN_KEY) === pin;
  }

  function formatDate(d) {
    if (!d) return '';
    const x = new Date(d);
    if (Number.isNaN(x.getTime())) return d;
    return x.getFullYear() + '/' + String(x.getMonth() + 1).padStart(2, '0') + '/' + String(x.getDate()).padStart(2, '0');
  }

  function maskName(name) {
    if (!name) return '未登録';
    if (!state.settings.anonymousList) return name;
    const p = name.trim().split(/\s+/);
    if (p.length >= 2) return p[0] + ' ' + p[1].charAt(0);
    return name.charAt(0) + '＊＊';
  }

  function maskPhone(phone) {
    if (!phone) return '—';
    if (!state.settings.maskPhone) return phone;
    const s = String(phone);
    return s.length <= 4 ? '＊＊＊' : s.slice(0,3) + '-****-' + s.slice(-4);
  }

  function initial(name) {
    return name ? name.trim().charAt(0) : '?';
  }

  function current() {
    return state.clients.find(function(c){ return c.id === state.selectedId; }) || null;
  }

  function emptyClient() {
    return {
      id: null,
      name: '',
      nameKana: '',
      age: '',
      gender: '',
      birthDate: '',
      phone: '',
      address: '',
      officeName: '',
      disabilityLevel: '',
      notes: '',
      careDetails: '',
      specialNotes: '',
      emergencyName: '',
      emergencyRelation: '',
      emergencyPhone: '',
      emergencyNotes: '',
      createdAt: ''
    };
  }

  function formData() {
    return state.formData || emptyClient();
  }

  function openList() {
    state.view = 'list';
    state.selectedId = null;
    state.formData = null;
    render();
  }

  function openDetail(id) {
    state.selectedId = id;
    state.view = 'detail';
    state.formData = null;
    render();
  }

  function startNewForm() {
    state.formData = emptyClient();
    state.view = 'form';
    render();
  }

  function startEditForm() {
    const c = current();
    if (!c) return;
    state.formData = Object.assign({}, c);
    state.view = 'form';
    render();
  }

  function closeForm() {
    if (state.formData && state.formData.id) {
      state.selectedId = state.formData.id;
      state.formData = null;
      state.view = 'detail';
    } else {
      state.formData = null;
      state.view = 'list';
    }
    render();
  }

  function openSettings() {
    state.view = 'settings';
    render();
  }

  function offices() {
    const set = new Set();
    state.clients.forEach(function(c){
      if (c.officeName) set.add(c.officeName);
    });
    return ['all'].concat(Array.from(set));
  }

  function filtered() {
    const q = state.search.trim().toLowerCase();
    return state.clients.filter(function(c){
      const officeOk = state.filterOffice === 'all' || c.officeName === state.filterOffice;
      if (!officeOk) return false;
      if (!q) return true;
      const hay = [c.name,c.nameKana,c.address,c.officeName,c.careDetails,c.specialNotes].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  function resetLock() {
    clearTimeout(lockTimer);
    if (state.locked) return;
    const m = Number(state.settings.autoLockMinutes || 0);
    if (!m) return;
    lockTimer = setTimeout(function(){
      state.locked = true;
      state.pinInput = '';
      state.pinStage = 'unlock';
      render();
    }, m * 60 * 1000);
  }

  function submitPin() {
    const pin = state.pinInput.trim();
    if (!/^\d{4}$/.test(pin)) return;

    if (state.pinStage === 'setup') {
      state.firstPin = pin;
      state.pinInput = '';
      state.pinStage = 'confirm';
      render();
      return;
    }

    if (state.pinStage === 'confirm') {
      if (pin !== state.firstPin) {
        state.pinInput = '';
        state.firstPin = '';
        state.pinStage = 'setup';
        alert('PINが一致しません');
        render();
        return;
      }
      savePin(pin);
      state.locked = false;
      state.pinInput = '';
      state.firstPin = '';
      state.pinStage = 'unlock';
      render();
      resetLock();
      return;
    }

    if (state.pinStage === 'unlock') {
      if (checkPin(pin)) {
        state.locked = false;
        state.pinInput = '';
        render();
        resetLock();
      } else {
        state.pinInput = '';
        alert('PINが違います');
        render();
      }
    }
  }

  function headerTitle() {
    if (state.view === 'detail') return '利用者詳細';
    if (state.view === 'form') return formData().id ? '編集' : '新規登録';
    if (state.view === 'settings') return '設定';
    return '';
  }

  function renderList() {
    let html = '';
    const arr = filtered();
    const total = state.clients.length;

    html += '<div class="card search"><div>🔍</div><input id="searchInput" type="text" placeholder="名前・住所・ケア内容で検索..." value="' + esc(state.search) + '">';
    if (state.search) {
      html += '<button id="clearSearchBtn" class="iconBtn" style="width:24px;height:24px;border-radius:999px;background:var(--border);color:var(--textLight);">✕</button>';
    }
    html += '</div>';

    const off = offices();
    if (off.length > 1) {
      html += '<div class="chips">';
      off.forEach(function(name){
        html += '<button class="chip ' + (state.filterOffice === name ? 'active' : '') + '" data-office-filter="' + esc(name) + '">' + (name === 'all' ? 'すべて' : esc(name)) + '</button>';
      });
      html += '</div>';
    }

    html += '<div class="muted" style="margin:0 4px 12px;">' + (total === 0 ? '利用者を登録しましょう' : arr.length + '名' + ((state.search || state.filterOffice !== 'all') ? ' / 全' + total + '名' : '') + ' の利用者') + '</div>';

    if (total === 0) {
      html += '<div class="card empty"><div class="emptyIcon">👤</div><div style="font-size:15px;font-weight:800;color:var(--text);margin-bottom:6px;">まだ利用者が登録されていません</div><div style="font-size:13px;">右上の「＋」から新規登録できます</div></div>';
    } else if (arr.length === 0) {
      html += '<div class="card empty">該当する利用者がいません</div>';
    } else {
      html += '<div class="list">';
      arr.forEach(function(c){
        html += '<button class="item" data-open-detail="' + esc(c.id) + '">';
        html += '<div class="avatar">' + esc(initial(c.name)) + '</div>';
        html += '<div class="itemMain">';
        html += '<div class="nameRow"><div class="name">' + esc(maskName(c.name)) + '</div><div class="muted">' + (c.age ? esc(c.age) + '歳' : '') + '</div>' + (c.disabilityLevel ? '<span class="miniBadge">' + esc(c.disabilityLevel) + '</span>' : '') + '</div>';
        if (c.officeName) html += '<div class="office">🏢 ' + esc(c.officeName) + '</div>';
        if (c.careDetails) html += '<div class="muted">' + esc(c.careDetails.length > 36 ? c.careDetails.slice(0,36) + '…' : c.careDetails) + '</div>';
        html += '</div><div class="muted" style="margin-top:12px;">›</div></button>';
      });
      html += '</div>';
    }
    return html;
  }

  function renderDetail() {
    const c = current();
    if (!c) return '<div class="card empty">利用者が見つかりません</div>';

    let html = '';
    html += '<div class="card detailTop"><div class="detailAvatar">' + esc(initial(c.name)) + '</div><div class="detailName">' + esc(c.name) + '</div>';
    if (c.nameKana) html += '<div class="muted" style="margin-bottom:8px;">' + esc(c.nameKana) + '</div>';
    html += '<div class="pills">';
    if (c.age) html += '<span class="pill">' + esc(c.age) + '歳</span>';
    if (c.gender) html += '<span class="pill">' + esc(c.gender) + '</span>';
    if (c.disabilityLevel) html += '<span class="pill accent">' + esc(c.disabilityLevel) + '</span>';
    html += '</div>';
    if (c.officeName) html += '<div style="margin-top:8px;font-size:12px;color:var(--primary);font-weight:800;">🏢 ' + esc(c.officeName) + '</div>';
    html += '</div>';

    html += '<div class="card section"><div class="sectionTitle">👤 基本情報</div>';
    html += '<div class="infoRow"><div class="infoLabel">住所</div><div class="infoValue">' + esc(c.address || '—') + '</div></div>';
    html += '<div class="infoRow"><div class="infoLabel">電話番号</div><div class="infoValue">' + esc(maskPhone(c.phone)) + '</div></div>';
    html += '<div class="infoRow"><div class="infoLabel">生年月日</div><div class="infoValue">' + esc(formatDate(c.birthDate) || '—') + '</div></div>';
    html += '<div class="infoRow"><div class="infoLabel">事業所</div><div class="infoValue">' + esc(c.officeName || '—') + '</div></div>';
    if (c.notes) html += '<div class="box" style="margin-top:10px;">' + esc(c.notes) + '</div>';
    html += '</div>';

    html += '<div class="card section"><div class="sectionTitle">📋 ケア内容</div>' + (c.careDetails ? '<div class="box">' + esc(c.careDetails) + '</div>' : '<div class="muted">未登録</div>') + '</div>';

    if (c.specialNotes) {
      html += '<div class="card section"><div class="sectionTitle accent">⭐ 特筆事項</div><div class="box accentBox">' + esc(c.specialNotes) + '</div></div>';
    }

    html += '<div class="card section"><div class="sectionTitle">🚨 緊急連絡先</div>';
    html += '<div class="infoRow"><div class="infoLabel">連絡先名</div><div class="infoValue">' + esc(c.emergencyName || '—') + '</div></div>';
    html += '<div class="infoRow"><div class="infoLabel">続柄</div><div class="infoValue">' + esc(c.emergencyRelation || '—') + '</div></div>';
    html += '<div class="infoRow"><div class="infoLabel">電話番号</div><div class="infoValue danger">' + esc(maskPhone(c.emergencyPhone)) + '</div></div>';
    if (c.emergencyNotes) html += '<div class="box dangerBox" style="margin-top:10px;">' + esc(c.emergencyNotes) + '</div>';
    html += '</div>';

    html += '<div class="rowBtns"><button class="btn primary" style="flex:1;" id="editClientBtn">編集する</button><button class="btn ghostDanger" id="deleteClientBtn">🗑</button></div>';
    return html;
  }

  function renderForm() {
    const f = formData();
    let html = '';
    html += '<form id="clientForm" class="card section">';
    html += '<div class="sectionTitle">👤 基本情報</div><div class="formGrid">';
    html += '<div class="field"><label>お名前 <span class="req">必須</span></label><input class="input" name="name" value="' + esc(f.name) + '" placeholder="山田 太郎"></div>';
    html += '<div class="field"><label>ふりがな</label><input class="input" name="nameKana" value="' + esc(f.nameKana) + '" placeholder="やまだ たろう"></div>';
    html += '<div class="fieldRow"><div class="field"><label>年齢</label><input class="input" type="number" name="age" value="' + esc(f.age) + '" placeholder="65"></div><div class="field"><label>性別</label><select class="select" name="gender"><option value="">選択</option><option value="男性"' + (f.gender === '男性' ? ' selected' : '') + '>男性</option><option value="女性"' + (f.gender === '女性' ? ' selected' : '') + '>女性</option><option value="その他"' + (f.gender === 'その他' ? ' selected' : '') + '>その他</option></select></div></div>';
    html += '<div class="field"><label>生年月日</label><input class="input" type="date" name="birthDate" value="' + esc(f.birthDate) + '"></div>';
    html += '<div class="field"><label>電話番号</label><input class="input" type="tel" name="phone" value="' + esc(f.phone) + '" placeholder="090-1234-5678"></div>';
    html += '<div class="field"><label>住所</label><input class="input" name="address" value="' + esc(f.address) + '" placeholder="東京都○○区..."></div>';
    html += '<div class="field"><label>事業所</label><input class="input" name="officeName" value="' + esc(f.officeName) + '" placeholder="○○事業所"></div>';
    html += '<div class="field"><label>障害支援区分</label><select class="select" name="disabilityLevel"><option value="">選択</option>';
    ['区分1','区分2','区分3','区分4','区分5','区分6'].forEach(function(level){
      html += '<option value="' + level + '"' + (f.disabilityLevel === level ? ' selected' : '') + '>' + level + '</option>';
    });
    html += '</select></div>';
    html += '<div class="field"><label>基本メモ</label><textarea class="textarea" name="notes" placeholder="その他の基本情報...">' + esc(f.notes) + '</textarea></div>';
    html += '</div>';

    html += '<div class="sectionTitle">📋 ケア内容</div><div class="field"><label>ケア内容・処置内容</label><textarea class="textarea large" name="careDetails" placeholder="吸引、体位変換、見守り、医療的ケアなど...">' + esc(f.careDetails) + '</textarea></div>';
    html += '<div class="sectionTitle accent">⭐ 特筆事項</div><div class="field"><textarea class="textarea large" name="specialNotes" placeholder="注意事項や引き継ぎ事項など...">' + esc(f.specialNotes) + '</textarea></div>';

    html += '<div class="sectionTitle">🚨 緊急連絡先</div><div class="formGrid">';
    html += '<div class="fieldRow"><div class="field"><label>連絡先名</label><input class="input" name="emergencyName" value="' + esc(f.emergencyName) + '" placeholder="山田 花子"></div><div class="field"><label>続柄</label><input class="input" name="emergencyRelation" value="' + esc(f.emergencyRelation) + '" placeholder="配偶者"></div></div>';
    html += '<div class="field"><label>電話番号</label><input class="input" type="tel" name="emergencyPhone" value="' + esc(f.emergencyPhone) + '" placeholder="090-9876-5432"></div>';
    html += '<div class="field"><label>緊急時の注意事項</label><textarea class="textarea" name="emergencyNotes" placeholder="緊急時の対応手順など...">' + esc(f.emergencyNotes) + '</textarea></div>';
    html += '</div>';

    html += '<div class="rowBtns" style="margin-top:24px;"><button type="button" class="btn secondary" id="cancelFormBtn">キャンセル</button><button type="submit" class="btn primary" style="flex:1;">' + (f.id ? '保存する' : '登録する') + '</button></div>';
    html += '</form>';
    return html;
  }

  function renderSettings() {
    let html = '';
    html += '<div class="card section"><div class="sectionTitle">🔐 セキュリティ設定</div><div class="settingsList">';
    html += '<div class="settingRow"><div><div style="font-size:14px;font-weight:800;">一覧を匿名表示</div><div class="helper">一覧画面で氏名を伏せ気味に表示します。</div></div><button class="toggle ' + (state.settings.anonymousList ? 'active' : '') + '" id="toggleAnonymous"></button></div>';
    html += '<div class="settingRow"><div><div style="font-size:14px;font-weight:800;">電話番号をマスク表示</div><div class="helper">詳細画面でも電話番号の一部を隠します。</div></div><button class="toggle ' + (state.settings.maskPhone ? 'active' : '') + '" id="toggleMaskPhone"></button></div>';
    html += '<div class="settingRow"><div><div style="font-size:14px;font-weight:800;">自動ロック</div><div class="helper">無操作で一定時間後にPINロックします。</div></div><select id="autoLockSelect" class="select" style="width:110px;padding:8px 10px;">';
    [1,3,5,10,15].forEach(function(n){
      html += '<option value="' + n + '"' + (Number(state.settings.autoLockMinutes) === n ? ' selected' : '') + '>' + n + '分</option>';
    });
    html += '</select></div></div></div>';

    html += '<div class="card section"><div class="sectionTitle">💾 データ管理</div><div class="helper">バックアップは手動で安全な場所に保管してください。</div><div class="rowBtns" style="margin-bottom:10px;"><button class="btn primary" id="exportBtn" style="flex:1;">バックアップ書き出し</button><label class="btn secondary" style="display:flex;align-items:center;justify-content:center;flex:1;">復元<input id="importInput" type="file" accept="application/json" style="display:none"></label></div><div class="rowBtns"><button class="btn danger" id="clearAllBtn" style="flex:1;">全データ削除</button></div></div>';

    html += '<div class="card section"><div class="sectionTitle">📱 使い方メモ</div><div class="helper">・このアプリは端末内保存です。<br>・ホーム画面に追加するとアプリ風に使えます。<br>・本体パスコード、Face ID を必ず設定してください。<br>・バックアップJSONは他人に送らないでください。</div><div class="rowBtns" style="margin-top:18px;"><button class="btn secondary" id="changePinBtn" style="flex:1;">PINを再設定</button><button class="btn secondary" id="settingsBackBtn" style="flex:1;">戻る</button></div></div>';
    return html;
  }

  function renderModal() {
    if (!state.modal) return '';
    let html = '';
    html += '<div class="overlay"><div class="dialog"><div class="dialogTitle">' + esc(state.modal.title) + '</div><div class="dialogText">' + esc(state.modal.text) + '</div><div class="rowBtns">';
    if (state.modal.type === 'delete') {
      html += '<button class="btn secondary" id="modalCancelBtn" style="flex:1;">キャンセル</button><button class="btn danger" id="modalDeleteBtn" style="flex:1;">削除する</button>';
    } else if (state.modal.type === 'clear') {
      html += '<button class="btn secondary" id="modalCancelBtn" style="flex:1;">キャンセル</button><button class="btn danger" id="modalClearBtn" style="flex:1;">削除する</button>';
    } else {
      html += '<button class="btn primary" id="modalOkBtn" style="flex:1;">OK</button>';
    }
    html += '</div></div></div>';
    return html;
  }

  function renderLock() {
    if (!state.locked) return '';
    let title = '重訪ケア管理';
    let text = '4桁PINを入力してください';
    if (state.pinStage === 'setup') {
      title = 'PINを設定';
      text = '初回設定です。4桁の数字を入力してください';
    } else if (state.pinStage === 'confirm') {
      title = 'PINを確認';
      text = '同じ4桁PINをもう一度入力してください';
    }
    return '<div class="lock"><div class="lockCard"><div class="lockBadge">🔒</div><div class="dialogTitle">' + esc(title) + '</div><div class="dialogText" style="margin-bottom:14px;">' + esc(text) + '</div><input id="pinField" class="pin" type="password" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="••••" value="' + esc(state.pinInput) + '"><div class="rowBtns"><button class="btn primary" id="pinSubmitBtn" style="flex:1;">OK</button></div><div class="helper" style="margin-top:14px;">このアプリは通信せず、入力データはこの端末のブラウザに保存されます。</div></div></div>';
  }

  function renderError(e) {
    app.innerHTML =
      '<div class="errorWrap">' +
      '<div class="errorBox">' +
      '<div style="font-size:20px;font-weight:800;margin-bottom:10px;">読み込みエラー</div>' +
      '<div class="helper" style="margin-bottom:16px;">アプリの保存データまたはブラウザのキャッシュ不整合が原因の可能性があります。</div>' +
      '<div class="box dangerBox" style="margin-bottom:16px;">' + esc(String(e && e.message ? e.message : e)) + '</div>' +
      '<div class="rowBtns">' +
      '<button class="btn secondary" id="reloadBtn" style="flex:1;">再読み込み</button>' +
      '<button class="btn danger" id="resetStorageBtn" style="flex:1;">このアプリの保存データ削除</button>' +
      '</div>' +
      '</div>' +
      '</div>';

    const reloadBtn = document.getElementById('reloadBtn');
    if (reloadBtn) reloadBtn.onclick = function(){ location.reload(); };

    const resetStorageBtn = document.getElementById('resetStorageBtn');
    if (resetStorageBtn) resetStorageBtn.onclick = function(){
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(SETTINGS_KEY);
      localStorage.removeItem(PIN_KEY);
      location.reload();
    };
  }

  function render() {
    try {
      let html = '';
      html += '<div class="header"><div class="headerRow">';
      if (state.view !== 'list') {
        html += '<button class="iconBtn" id="backBtn">‹</button>';
      } else {
        html += '<div class="brand"><div class="brandIcon">💚</div><div><div class="title">重訪ケア管理</div><div class="subtitle">個人利用専用・端末保存</div></div></div>';
      }

      html += '<div style="font-size:15px;font-weight:700;min-width:56px;text-align:center;">' + esc(headerTitle()) + '</div>';

      if (state.view === 'list') {
        html += '<div class="actions"><button class="iconBtn" id="settingsBtn">⚙️</button><button class="iconBtn white" id="addBtn">＋</button></div>';
      } else {
        html += '<div style="width:38px;"></div>';
      }

      html += '</div><div class="security">通信なし / localStorage保存 / PINロック対応。実データは端末管理にご注意ください。</div></div>';
      html += '<main class="main">';
      if (state.view === 'detail') html += renderDetail();
      else if (state.view === 'form') html += renderForm();
      else if (state.view === 'settings') html += renderSettings();
      else html += renderList();
      html += '</main>';
      html += renderModal();
      html += renderLock();
      app.innerHTML = html;
      bindEvents();
    } catch (e) {
      console.error(e);
      renderError(e);
    }
  }

  function bindEvents() {
    const pinField = document.getElementById('pinField');
    if (pinField) {
      pinField.focus();
      pinField.addEventListener('input', function(e){
        state.pinInput = e.target.value.replace(/\D/g, '').slice(0,4);
        if (e.target.value !== state.pinInput) e.target.value = state.pinInput;
      });
      pinField.addEventListener('keydown', function(e){
        if (e.key === 'Enter') {
          e.preventDefault();
          submitPin();
        }
      });
    }

    const pinSubmitBtn = document.getElementById('pinSubmitBtn');
    if (pinSubmitBtn) pinSubmitBtn.onclick = submitPin;

    if (state.locked) {
      bindModal();
      return;
    }

    resetLock();

    const backBtn = document.getElementById('backBtn');
    if (backBtn) {
      backBtn.onclick = function(){
        if (state.view === 'form') {
          closeForm();
          return;
        }
        if (state.view === 'detail' || state.view === 'settings') {
          openList();
        }
      };
    }

    const addBtn = document.getElementById('addBtn');
    if (addBtn) addBtn.onclick = startNewForm;

    const settingsBtn = document.getElementById('settingsBtn');
    if (settingsBtn) settingsBtn.onclick = openSettings;

    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.oninput = function(e){
        state.search = e.target.value;
        render();
      };
    }

    const clearSearchBtn = document.getElementById('clearSearchBtn');
    if (clearSearchBtn) {
      clearSearchBtn.onclick = function(){
        state.search = '';
        render();
      };
    }

    document.querySelectorAll('[data-office-filter]').forEach(function(btn){
      btn.onclick = function(){
        state.filterOffice = btn.getAttribute('data-office-filter');
        render();
      };
    });

    document.querySelectorAll('[data-open-detail]').forEach(function(btn){
      btn.onclick = function(){
        openDetail(btn.getAttribute('data-open-detail'));
      };
    });

    const editClientBtn = document.getElementById('editClientBtn');
    if (editClientBtn) editClientBtn.onclick = startEditForm;

    const deleteClientBtn = document.getElementById('deleteClientBtn');
    if (deleteClientBtn) {
      deleteClientBtn.onclick = function(){
        state.modal = {
          type:'delete',
          title:'削除しますか？',
          text:'この利用者情報を削除します。この操作は取り消せません。'
        };
        render();
      };
    }

    bindForm();
    bindSettings();
    bindModal();
  }

  function bindForm() {
    const form = document.getElementById('clientForm');
    if (!form) return;

    const cancel = document.getElementById('cancelFormBtn');
    if (cancel) cancel.onclick = closeForm;

    form.onsubmit = function(e){
      e.preventDefault();
      const fd = new FormData(form);
      const base = state.formData || emptyClient();

      const c = normalizeClient({
        id: base.id || null,
        createdAt: base.createdAt || '',
        name: String(fd.get('name') || '').trim(),
        nameKana: String(fd.get('nameKana') || '').trim(),
        age: String(fd.get('age') || '').trim(),
        gender: String(fd.get('gender') || '').trim(),
        birthDate: String(fd.get('birthDate') || '').trim(),
        phone: String(fd.get('phone') || '').trim(),
        address: String(fd.get('address') || '').trim(),
        officeName: String(fd.get('officeName') || '').trim(),
        disabilityLevel: String(fd.get('disabilityLevel') || '').trim(),
        notes: String(fd.get('notes') || '').trim(),
        careDetails: String(fd.get('careDetails') || '').trim(),
        specialNotes: String(fd.get('specialNotes') || '').trim(),
        emergencyName: String(fd.get('emergencyName') || '').trim(),
        emergencyRelation: String(fd.get('emergencyRelation') || '').trim(),
        emergencyPhone: String(fd.get('emergencyPhone') || '').trim(),
        emergencyNotes: String(fd.get('emergencyNotes') || '').trim()
      });

      if (!c.name) {
        alert('お名前を入力してください');
        return;
      }

      if (base.id) {
        c.id = base.id;
        c.createdAt = base.createdAt || '';
        state.clients = state.clients.map(function(x){
          return x.id === c.id ? c : x;
        });
      } else {
        c.id = makeId();
        c.createdAt = new Date().toISOString();
        state.clients.unshift(c);
      }

      save();
      state.selectedId = c.id;
      state.formData = null;
      state.view = 'detail';
      render();
    };
  }

  function bindSettings() {
    const toggleAnonymous = document.getElementById('toggleAnonymous');
    if (toggleAnonymous) {
      toggleAnonymous.onclick = function(){
        state.settings.anonymousList = !state.settings.anonymousList;
        save();
        render();
      };
    }

    const toggleMaskPhone = document.getElementById('toggleMaskPhone');
    if (toggleMaskPhone) {
      toggleMaskPhone.onclick = function(){
        state.settings.maskPhone = !state.settings.maskPhone;
        save();
        render();
      };
    }

    const autoLockSelect = document.getElementById('autoLockSelect');
    if (autoLockSelect) {
      autoLockSelect.onchange = function(e){
        state.settings.autoLockMinutes = Number(e.target.value);
        save();
        resetLock();
      };
    }

    const exportBtn = document.getElementById('exportBtn');
    if (exportBtn) exportBtn.onclick = exportBackup;

    const importInput = document.getElementById('importInput');
    if (importInput) {
      importInput.onchange = function(e){
        const file = e.target.files && e.target.files[0];
        if (file) importBackup(file);
      };
    }

    const clearAllBtn = document.getElementById('clearAllBtn');
    if (clearAllBtn) {
      clearAllBtn.onclick = function(){
        state.modal = {
          type:'clear',
          title:'全データを削除しますか？',
          text:'利用者データと設定をすべて削除します。この操作は元に戻せません。'
        };
        render();
      };
    }

    const changePinBtn = document.getElementById('changePinBtn');
    if (changePinBtn) {
      changePinBtn.onclick = function(){
        state.locked = true;
        state.pinInput = '';
        state.pinStage = 'setup';
        state.firstPin = '';
        localStorage.removeItem(PIN_KEY);
        render();
      };
    }

    const settingsBackBtn = document.getElementById('settingsBackBtn');
    if (settingsBackBtn) settingsBackBtn.onclick = openList;
  }

  function bindModal() {
    const modalOkBtn = document.getElementById('modalOkBtn');
    if (modalOkBtn) modalOkBtn.onclick = function(){ state.modal = null; render(); };

    const modalCancelBtn = document.getElementById('modalCancelBtn');
    if (modalCancelBtn) modalCancelBtn.onclick = function(){ state.modal = null; render(); };

    const modalDeleteBtn = document.getElementById('modalDeleteBtn');
    if (modalDeleteBtn) {
      modalDeleteBtn.onclick = function(){
        state.clients = state.clients.filter(function(c){ return c.id !== state.selectedId; });
        save();
        state.selectedId = null;
        state.modal = null;
        state.view = 'list';
        render();
      };
    }

    const modalClearBtn = document.getElementById('modalClearBtn');
    if (modalClearBtn) {
      modalClearBtn.onclick = function(){
        state.clients = [];
        state.settings = { ...DEFAULT_SETTINGS };
        state.selectedId = null;
        state.formData = null;
        state.search = '';
        state.filterOffice = 'all';
        state.modal = null;
        state.locked = true;
        state.pinInput = '';
        state.pinStage = 'setup';
        state.firstPin = '';
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(SETTINGS_KEY);
        localStorage.removeItem(PIN_KEY);
        render();
      };
    }
  }

  function exportBackup() {
    try {
      const payload = {
        exportedAt: new Date().toISOString(),
        app: '重訪ケア管理',
        version: 3,
        clients: state.clients,
        settings: state.settings
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'care-backup-' + new Date().toISOString().slice(0,10) + '.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      alert('バックアップを書き出しました');
    } catch (e) {
      alert('バックアップ書き出しに失敗しました');
    }
  }

  function importBackup(file) {
    const reader = new FileReader();
    reader.onload = function(){
      try {
        const data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.clients)) throw new Error('invalid backup');
        state.clients = data.clients.map(normalizeClient).filter(Boolean);
        state.settings = normalizeSettings(data.settings);
        save();
        alert('復元が完了しました');
        render();
      } catch (e) {
        alert('復元できませんでした');
      }
    };
    reader.readAsText(file);
  }

  window.addEventListener('visibilitychange', function(){
    if (document.hidden && !state.locked) {
      state.locked = true;
      state.pinInput = '';
      state.pinStage = 'unlock';
      render();
    }
  });

  window.addEventListener('beforeunload', save);

  window.addEventListener('error', function(e){
    console.error('window error', e.error || e.message);
  });

  window.addEventListener('unhandledrejection', function(e){
    console.error('promise rejection', e.reason);
  });

  try {
    load();
    render();
  } catch (e) {
    console.error(e);
    renderError(e);
  }
})();
</script>
</body>
</html>
